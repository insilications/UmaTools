  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

    <main id="main" class="container">
      <h1 data-i18n="random.title">Randomizer</h1>

      <!-- Support Deck Randomizer -->
      <section
        id="supportRandomizer"
        class="result"
        data-scroll-section
        data-scroll-label="Support"
      >
        <div class="choice">
          <h3 data-i18n="random.supportDeck">Support Deck (5 cards)</h3>
          <div class="toolbar" role="group" aria-label="Support filters">
            <label><input type="checkbox" id="fSSR" checked /> SSR</label>
            <label><input type="checkbox" id="fSR" checked /> SR</label>
            <label><input type="checkbox" id="fR" checked /> R</label>

            <div style="flex: 1 1 220px"></div>

            <label class="toggle" style="margin-right: 0.75rem"
              ><input type="checkbox" id="speed2x" />
              <span data-i18n="random.doubleSpeed">2&times; speed</span></label
            >
            <button class="btn primary" id="rollBtn" type="button" data-i18n="random.roll5">
              Roll 5
            </button>
            <button class="btn" id="clearExBtn" type="button" data-i18n="random.clearExclusions">
              Clear Exclusions
            </button>
          </div>

          <div class="toolbar" role="group" aria-label="Exclude cards">
            <input
              list="supportList"
              id="excludeInput"
              placeholder="Exclude a support (choose from list)"
              data-i18n-placeholder="random.excludePlaceholder"
            />
            <datalist id="supportList"></datalist>
            <button class="btn" id="addExBtn" type="button" data-i18n="random.addExclusions">
              Add to Exclusions
            </button>
          </div>

          <div id="excludeChips" class="chips" aria-live="polite"></div>
        </div>

        <div id="deckResults" class="grid" aria-live="polite"></div>
      </section>

      <div class="spacer"></div>

      <!-- Uma Randomizer -->
      <section id="umaRandomizer" class="result" data-scroll-section data-scroll-label="Uma">
        <div class="choice">
          <h3 data-i18n="random.randomUma">Random Uma</h3>
          <div class="toolbar">
            <label class="toggle" style="margin-right: 0.75rem"
              ><input type="checkbox" id="speed2xUma" />
              <span data-i18n="random.doubleSpeed">2&times; speed</span></label
            >
            <button
              class="btn primary"
              id="pickUmaBtn"
              type="button"
              data-i18n="random.pickRandomUma"
            >
              Pick Random Uma
            </button>
          </div>
        </div>

        <div id="umaResult" class="grid" aria-live="polite"></div>
      </section>
    </main>
