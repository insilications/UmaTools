  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
    <button
      id="modeToggleBtn"
      aria-label="Toggle dark/light mode"
      data-i18n-aria="common.toggleDarkLight"
      class="mode-toggle-btn"
      title="Toggle dark/light mode"
      data-i18n-title="common.toggleDarkLight"
    >

        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="feather feather-sun"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg
        id="iconMoon"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"

        style="display: none"

      </svg>
    </button>

    <main id="main" class="accel-page container">
      <h1 data-l10n="title">Valid Accel Checker</h1>

      <div class="accel-layout">
        <section class="card card-elevated race-config-container accel-controls" aria-label="Checker setup">
          <div class="accel-section">
            <h2 data-l10n="raceSetup">Race Setup</h2>
            <div class="accel-setup-grid">
              <label>
                <span data-l10n="racePreset">Race preset</span>
                <select id="presetSel">
                  <option value="">- Select race -</option>
                </select>
              </label>
              <label>
                <span data-l10n="distance">Distance</span>
                <select id="distSel">
                  <option value="">- Select distance -</option>
                </select>
              </label>
              <label>
                <span data-l10n="trackType">Track type</span>
                <select id="gtSel">
                  <option value="">- Select track -</option>
                </select>
              </label>
              <label>
                <span data-l10n="trackCondition">Track condition</span>
                <select id="gcSel">
                  <option value="">- Select condition -</option>
                </select>
              </label>
              <label>
                <span data-l10n="racecourse">Racecourse</span>
                <select id="venueSel">
                  <option value="">- Select racecourse -</option>
                </select>
              </label>
              <label>
                <span data-l10n="mood">Mood (optional)</span>
                <select id="mvSel">
                  <option value="">All moods</option>
                </select>
              </label>
              <label>
                <span data-l10n="skillNameFilter">Skill name filter (optional)</span>
                <input
                  id="skillSearch"
                  type="text"
                  data-l10n-placeholder="skillNameFilterPlaceholder"
                  placeholder="Search by EN or JP skill name"
                  autocomplete="off"
                />
              </label>
            </div>
          </div>

          <div class="accel-section">
            <h2 data-l10n="rarityFilter">Rarity Filter</h2>
            <div id="rarityFilters" class="accel-rarity">
              <button class="accel-rarity-btn active" type="button" data-rarity="all" aria-pressed="true">
                <span data-l10n="rarityAll">All</span>
              </button>
              <button class="accel-rarity-btn" type="button" data-rarity="1" aria-pressed="false">
                <span data-l10n="rarityWhite">White</span>
              </button>
              <button class="accel-rarity-btn" type="button" data-rarity="2" aria-pressed="false">
                <span data-l10n="rarityGold">Gold</span>
              </button>
              <button class="accel-rarity-btn" type="button" data-rarity="3" aria-pressed="false">
                <span data-l10n="raritySubUnique">Sub-Unique</span>
              </button>
              <button class="accel-rarity-btn" type="button" data-rarity="4" aria-pressed="false">
                <span data-l10n="rarityUnique">Unique</span>
              </button>
              <button class="accel-rarity-btn" type="button" data-rarity="6" aria-pressed="false">
                <span data-l10n="rarityEvolution">Evolution</span>
              </button>
            </div>
          </div>

          <div class="accel-section">
            <h2 data-l10n="courseDetails">Course Details</h2>
            <div class="accel-inline-grid">
              <label>
                <span data-l10n="finalPhaseStart">Final phase start (ls)</span>
                <input id="manLS" type="number" min="0" max="4000" placeholder="ex: 1333" />
              </label>
              <label>
                <span data-l10n="finalCorner">Final corner (fc)</span>
                <input id="manFC" type="number" min="0" max="4000" placeholder="ex: 1230" />
              </label>
              <label>
                <span data-l10n="finalStraight">Final straight (fs)</span>
                <input id="manFS" type="number" min="0" max="4000" placeholder="ex: 1500" />
              </label>
            </div>

            <div class="slope-group">
              <div class="slope-header">
                <h3 data-l10n="uphill">Uphill Sections</h3>
                <button id="addUpBtn" class="btn btn-secondary" type="button" data-l10n="addSection">
                  Add section
                </button>
              </div>
              <div id="upRows" class="slope-rows"></div>
            </div>

            <div class="slope-group">
              <div class="slope-header">
                <h3 data-l10n="downhill">Downhill Sections</h3>
                <button id="addDnBtn" class="btn btn-secondary" type="button" data-l10n="addSection">
                  Add section
                </button>
              </div>
              <div id="dnRows" class="slope-rows"></div>
            </div>
          </div>

          <div id="formError" class="accel-error" role="alert" hidden></div>

          <div class="accel-actions">
            <button id="searchBtn" class="btn primary" type="button" data-l10n="search">
              Search Valid Acceleration
            </button>
            <button id="resetBtn" class="btn btn-secondary" type="button" data-l10n="reset">Reset</button>
          </div>
        </section>

        <section class="card card-elevated accel-results" aria-live="polite">
          <div class="results-head">
            <div class="results-main">
              <h2 data-l10n="results">Results</h2>
              <p class="muted" data-l10n="resultsSub">
                Output is sorted by activation timing, uncertainty, and effect value.
              </p>
            </div>
            <div class="results-stats">
              <div class="mini-stat">
                <span data-l10n="dbSkills">DB skills</span>
                <strong id="dbCnt">-</strong>
              </div>
              <div class="mini-stat">
                <span data-l10n="serverMode">Server mode</span>
                <strong id="serverMode">-</strong>
              </div>
              <div class="mini-stat">
                <span data-l10n="validSkills">Valid skills</span>
                <strong id="resCnt">-</strong>
                <span id="resTot"></span>
              </div>
            </div>
          </div>

          <div id="chips" class="chips"></div>
          <div id="warnBox" class="warn-box" hidden data-l10n="missingCourseInfoWarning">
            Final corner (fc) or final straight (fs) is missing. Accuracy may decrease.
          </div>
          <div id="resBody" class="results-body"></div>
        </section>
      </div>
    </main>
