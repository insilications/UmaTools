    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

      <section class="search-panel">
        <form id="search-form" class="search-form">

      <div class="ocr-controls">
        <button id="captureBtn" class="capture-btn" data-i18n="events.captureOCR">
          Capture Screen for OCR
        </button>
        <label class="scan-time-label" for="searchDelayButtons" data-i18n="events.scanTime"
          >Scan Time:</label
        >
        <div
          id="searchDelayButtons"
          class="delay-buttons"
          role="group"
          aria-label="Select OCR scan time"
          data-i18n-aria="events.selectScanTime"
        >
          <button data-delay="3000" class="delay-btn active" type="button">3s</button>
          <button data-delay="5000" class="delay-btn" type="button">5s</button>
          <button data-delay="10000" class="delay-btn" type="button">10s</button>
        </div>
      </div>

      <div id="suggestions" class="ocr-suggestions"></div>
      <video id="captureVideo" autoplay muted playsinline></video>
      <div id="result" class="result"></div>
