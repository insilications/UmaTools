name: Gametora Scrape

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gametora-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync Branch
        run: |
          git checkout -B "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Run Full Scrape
        run: |
          node scripts/gametora.js --what all --server global \
            --out-uma assets/uma_data.json \
            --out-supports assets/support_card.json \
            --out-support-hints assets/support_hints.json \
            --out-skills assets/skills_all.json

      - name: Generate Skills Core
        run: node scripts/generate-skills-core.js

      - name: Commit If Changed
        run: |
          git add -A assets/uma_data.json assets/support_card.json assets/support_hints.json assets/skills_all.json assets/skills_core.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update gametora data"
          git push
