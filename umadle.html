    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

    <main id="main" class="container">

      </button>

      <section class="search-panel">
        <button id="pickUmaBtn" class="pick-uma-btn" type="button">
          <span class="pick-uma-label" data-i18n="umadle.selectUma">Select an Uma...</span>
        </button>
        <div id="legend" class="status">
          Legend: <b>&#10003;</b> exact match, <span class="sym up">&#9650;</span> your guess is
          lower (go up), <span class="sym down">&#9660;</span> your guess is higher (go down)
        </div>
      </section>

      <!-- Character Picker Modal -->
      <div id="umaPickerModal" class="support-modal" hidden>
        <div class="support-modal-backdrop"></div>
        <div class="support-modal-content">
          <div class="support-modal-header">
            <span class="support-modal-title" data-i18n="umadle.selectCharacter"

            >
            <button class="support-modal-close" aria-label="Close" data-i18n-aria="common.close">
              &times;
            </button>
          </div>
          <div class="support-modal-filters">
            <input
              id="umaPickerSearch"
              type="text"
              placeholder="Search by name..."
              autocomplete="off"
              data-i18n-placeholder="common.searchByName"
            />
          </div>
          <div id="umaPickerList" class="support-modal-list"></div>
        </div>
      </div>

      <div id="rows" class="umadle-grid"></div>
      <div id="footer" class="status"></div>
    </main>

    <!-- WIN MODAL -->

        <div class="btn-row">
