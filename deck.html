    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>

    <main id="main" class="container">
      <h1 data-i18n="deck.title">Deck Builder</h1>

          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>

          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>

          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="feather feather-moon"

        </svg>

      <!-- Character Section -->
      <section
        class="deck-section"
        id="deck-character"
        data-scroll-section
        data-scroll-label="Character"
      >
        <div class="deck-section-title" data-i18n="deck.character">Character</div>
        <div id="charDisplay"></div>
      </section>

      <!-- Character Picker Modal -->
      <div id="charModal" class="support-modal" hidden>
        <div class="support-modal-backdrop"></div>
        <div class="support-modal-content">
          <div class="support-modal-header">
            <span class="support-modal-title" data-i18n="deck.selectCharacter"
              >Select Character</span
            >
            <button class="support-modal-close" aria-label="Close" data-i18n-aria="common.close">
              &times;
            </button>
          </div>
          <div class="support-modal-filters">
            <input
              id="charSearch"
              type="text"
              placeholder="Search by name..."
              autocomplete="off"
              data-i18n-placeholder="common.searchByName"
            />
            <div class="filter-row">
              <div class="filter-group-wrap">
                <span class="filter-group-label" data-i18n="deck.distance">Distance</span>
                <div class="filter-group" id="charDistFilters"></div>
              </div>
              <div class="filter-group-wrap">
                <span class="filter-group-label" data-i18n="deck.surface">Surface</span>
                <div class="filter-group" id="charSurfFilters"></div>
              </div>
              <div class="filter-group-wrap">
                <span class="filter-group-label" data-i18n="deck.strategy">Strategy</span>
                <div class="filter-group" id="charStratFilters"></div>
              </div>
            </div>
          </div>
          <div id="charModalList" class="support-modal-list"></div>
        </div>
      </div>

      <!-- Support Cards Section -->
      <section
        class="deck-section"
        id="deck-support"
        data-scroll-section
        data-scroll-label="Support"
      >
        <div class="deck-section-title">Support Cards (<span id="supportCount">0</span>/6)</div>
        <div id="supportSlots" class="deck-support-slots">
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
          <div class="skeleton-card" aria-hidden="true" style="width: 140px; height: 180px"></div>
        </div>
      </section>

      <!-- Support Card Picker Modal -->

        <div class="support-modal-backdrop"></div>
        <div class="support-modal-content">
          <div class="support-modal-header">
            <span class="support-modal-title" data-i18n="deck.selectSupportCard"
              >Select Support Card</span
            >
            <button class="support-modal-close" aria-label="Close" data-i18n-aria="common.close">
              &times;
            </button>
          </div>
          <div class="support-modal-filters">
            <input
              id="supportSearch"
              type="text"
              placeholder="Search by name..."
              autocomplete="off"
              data-i18n-placeholder="common.searchByName"
            />
            <div class="filter-row">
              <div class="filter-group" id="typeFilters"></div>
              <div class="filter-group" id="rarityFilters"></div>
            </div>
            <div class="filter-row sort-row">
              <label class="sort-label" for="supportSort" data-i18n="deck.sortBy">Sort by:</label>
              <select id="supportSort" class="sort-select"></select>
            </div>
          </div>
          <div id="supportModalList" class="support-modal-list"></div>
        </div>
      </div>

      <!-- Support Card Effects Panel -->
      <div id="effectsPanel" class="effects-panel" hidden>
        <div class="effects-panel-backdrop"></div>
        <div class="effects-panel-content">
          <div class="effects-panel-header">
            <span id="effectsPanelTitle" class="effects-panel-title"></span>
            <button class="effects-panel-close" aria-label="Close" data-i18n-aria="common.close">
              &times;
            </button>
          </div>
          <div class="effects-panel-level">
            <label for="effectsLevelSlider" data-i18n="deck.levelLabel">Level:</label>
            <input id="effectsLevelSlider" type="range" min="0" max="4" value="4" />
            <span id="effectsLevelLabel">MLB</span>
          </div>
          <div id="effectsPanelBody" class="effects-panel-body"></div>
        </div>
      </div>

      <!-- Combined Summary -->
      <section
        class="deck-section"
        id="summarySection"
        style="display: none"
        data-scroll-section
        data-scroll-label="Summary"
      >
        <div class="deck-section-title" data-i18n="deck.combinedSummary">Combined Summary</div>
        <div id="summaryContent" class="deck-summary"></div>
      </section>

      <!-- Actions -->
      <div class="deck-actions">
        <button id="openSavedBtn" class="primary" data-i18n="deck.savedDecks">Saved Decks</button>
        <button id="openTemplatesBtn" data-i18n="deck.metaTemplates">Meta Templates</button>
        <button id="shareLinkBtn" data-i18n="deck.copyShareLink">Copy Share Link</button>
        <button id="openOptimizerBtn" data-i18n="deck.openInOptimizer">Open in Optimizer</button>
        <button id="clearAllBtn" data-i18n="deck.clearAll">Clear All</button>
      </div>

      <!-- Saved Decks Modal -->
      <div id="savedDecksModal" class="support-modal" hidden>
        <div class="support-modal-backdrop"></div>
        <div class="support-modal-content">
          <div class="support-modal-header">
            <span class="support-modal-title" data-i18n="deck.savedDecks">Saved Decks</span>
            <button class="support-modal-close" aria-label="Close" data-i18n-aria="common.close">
              &times;
            </button>
          </div>
          <div class="saved-modal-actions">
            <div class="saved-modal-save-row">
              <input
                id="saveDeckName"
                type="text"
                placeholder="Deck name..."
                autocomplete="off"
                data-i18n-placeholder="deck.deckName"
              />
              <button id="saveDeckBtn" class="saved-modal-save-btn" data-i18n="common.save">
                Save
              </button>
            </div>
          </div>
          <div id="savedDecksList" class="support-modal-list saved-decks-list"></div>
        </div>
      </div>

      <!-- Meta Templates Modal -->
      <div id="templatesModal" class="support-modal" hidden>
        <div class="support-modal-backdrop"></div>
        <div class="support-modal-content">
          <div class="support-modal-header">
            <span class="support-modal-title" data-i18n="deck.metaTemplates">Meta Templates</span>
            <button class="support-modal-close" aria-label="Close" data-i18n-aria="common.close">
              &times;

          </div>
          <p class="templates-source" data-i18n="deck.templatesSource">
            Based on Class 6 statistics from uma.moe

          <div id="templatesModalList" class="support-modal-list templates-list"></div>
        </div>
      </div>

      <div id="statusMsg" class="inline-note muted"></div>
