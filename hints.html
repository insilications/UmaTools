    <script>
      // Image optimization helper - creates picture elements with WebP and fallback
      (function() {
        'use strict';

        /**
         * Creates a picture element HTML string with WebP source and fallback
         * @param {string} src - Original image source (PNG/JPG)
         * @param {string} alt - Alt text for the image
         * @param {string} className - CSS class name(s) for the img element
         * @param {Object} attrs - Additional attributes (loading, decoding, fetchpriority, etc.)
         * @returns {string} HTML string for picture element
         */
        window.createPictureHTML = function(src, alt, className, attrs) {
          if (!src) return '';

          attrs = attrs || {};
          var loading = attrs.loading || 'lazy';
          var decoding = attrs.decoding || 'async';
          var fetchpriority = attrs.fetchpriority || '';

          // Convert .png or .jpg to .webp
          var webpSrc = src.replace(/\.(png|jpg|jpeg)$/i, '.webp');

          // Build attributes string
          var attrStr = className ? ` class="${className}"` : '';
          attrStr += ` alt="${alt || ''}"`;
          attrStr += ` loading="${loading}"`;
          attrStr += ` decoding="${decoding}"`;
          if (fetchpriority) {
            attrStr += ` fetchpriority="${fetchpriority}"`;
          }

          // Return picture element with WebP source and fallback
          return `<picture>` +
            `<source srcset="${webpSrc}" type="image/webp">` +
            `<img src="${src}"${attrStr}>` +
            `</picture>`;
        };
      })();
    </script>

    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
