<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="440" fill="white"/>
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="415" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">Stat Score per Stat Value (Single Stat, 0-2500)</text>

  <!-- Background -->
  <rect x="80" y="30" width="670" height="330" fill="#fafafa" stroke="#374151" stroke-width="1" rx="4"/>

  <!-- Horizontal grid lines + Y-axis labels -->
  <g stroke="#d1d5db" stroke-width="0.5" fill="#374151" font-size="10" text-anchor="end">
    <line x1="80" y1="360" x2="750" y2="360"/><text x="75" y="363">0</text>
    <line x1="80" y1="294" x2="750" y2="294"/><text x="75" y="297">5k</text>
    <line x1="80" y1="228" x2="750" y2="228"/><text x="75" y="231">10k</text>
    <line x1="80" y1="162" x2="750" y2="162"/><text x="75" y="165">15k</text>
    <line x1="80" y1="96" x2="750" y2="96"/><text x="75" y="99">20k</text>
    <line x1="80" y1="30" x2="750" y2="30"/><text x="75" y="33">25k</text>
  </g>

  <!-- Vertical grid lines + X-axis labels -->
  <g stroke="#d1d5db" stroke-width="0.5" fill="#374151" font-size="10" text-anchor="middle">
    <line x1="80" y1="30" x2="80" y2="360"/>  <text x="80" y="378">0</text>
    <line x1="214" y1="30" x2="214" y2="360"/><text x="214" y="378">500</text>
    <line x1="348" y1="30" x2="348" y2="360"/><text x="348" y="378">1000</text>
    <line x1="482" y1="30" x2="482" y2="360"/><text x="482" y="378">1500</text>
    <line x1="616" y1="30" x2="616" y2="360"/><text x="616" y="378">2000</text>
    <line x1="750" y1="30" x2="750" y2="360"/><text x="750" y="378">2500</text>
  </g>

  <!-- Axis labels -->
  <text x="415" y="400" text-anchor="middle" font-size="11" fill="#1f2937">Stat Value</text>
  <text x="20" y="195" text-anchor="middle" font-size="11" fill="#1f2937" transform="rotate(-90,20,195)">Score</text>

  <!-- Filled area under curve -->
  <polygon points="80,360 106.8,359.1 133.6,357.6 160.4,355.4 187.2,352.4 214,348.8 240.8,344.9 267.6,340.7 294.4,336.1 321.2,330.8 348,325.2 374.8,318.1 401.6,309.3 428.4,298.1 455.2,285.2 482,270.6 508.8,254.2 535.6,236.1 562.4,216.3 589.2,194.8 616,171.5 642.8,147.2 669.6,122.3 696.4,96.9 723.2,70.9 750,44.5 750,360" fill="url(#curveGrad)"/>

  <!-- Main curve line -->
  <polyline points="80,360 106.8,359.1 133.6,357.6 160.4,355.4 187.2,352.4 214,348.8 240.8,344.9 267.6,340.7 294.4,336.1 321.2,330.8 348,325.2 374.8,318.1 401.6,309.3 428.4,298.1 455.2,285.2 482,270.6 508.8,254.2 535.6,236.1 562.4,216.3 589.2,194.8 616,171.5 642.8,147.2 669.6,122.3 696.4,96.9 723.2,70.9 750,44.5" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Key data point markers -->
  <g fill="#2563eb" stroke="#1f2937" stroke-width="1">
    <circle cx="80" cy="360" r="4"/>
    <circle cx="348" cy="325.2" r="4"/>
    <circle cx="482" cy="270.6" r="4"/>
    <circle cx="616" cy="171.5" r="4"/>
    <circle cx="750" cy="44.5" r="4"/>
  </g>

  <!-- Data point labels (white outline for readability over gradient) -->
  <g font-size="10" fill="#1f2937" font-weight="bold" stroke="white" stroke-width="3" paint-order="stroke">
    <text x="355" y="316">2,635</text>
    <text x="489" y="263">6,773</text>
    <text x="623" y="164">14,280</text>
    <text x="743" y="64" text-anchor="end">23,905</text>
  </g>

  <!-- Annotation: inflection zone (white outline for readability over gradient) -->
  <line x1="401" y1="33" x2="401" y2="360" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="405" y="44" font-size="9" fill="#dc2626" font-weight="600" stroke="white" stroke-width="3" paint-order="stroke">stat 1200 - growth accelerates</text>

  <!-- Legend box -->
  <rect x="585" y="394" width="180" height="24" rx="4" fill="white" stroke="#374151" stroke-width="1"/>
  <text x="593" y="410" font-size="10" fill="#1f2937">Per-point rate: 0.5 to 20.2</text>
</svg>
