<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="system-ui, -apple-system, sans-serif">
  <rect width="860" height="360" fill="white"/>

  <text x="430" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">Rating Badge Progression (298 Tiers)</text>
  <text x="430" y="44" text-anchor="middle" font-size="10" fill="#4b5563">Each row is scaled to its own threshold range.</text>

  <!-- Base ranks: 0 to UG threshold -->
  <g transform="translate(50, 68)">
    <text x="0" y="-8" font-size="10" font-weight="700" fill="#1f2937">BASE RANKS (0 to 19.6k)</text>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="#f3f4f6" stroke="#374151" stroke-width="1"/>
    <g clip-path="url(#baseClip)">
      <rect x="0" y="0" width="23.3" height="30" fill="#9ca3af"/>
      <rect x="23.3" y="0" width="27.1" height="30" fill="#8b8f97"/>
      <rect x="50.4" y="0" width="38.8" height="30" fill="#78716c"/>
      <rect x="89.2" y="0" width="46.5" height="30" fill="#a16207"/>
      <rect x="135.7" y="0" width="116.3" height="30" fill="#ca8a04"/>
      <rect x="252.0" y="0" width="135.7" height="30" fill="#65a30d"/>
      <rect x="387.8" y="0" width="174.5" height="30" fill="#0891b2"/>
      <rect x="562.2" y="0" width="116.3" height="30" fill="#7c3aed"/>
      <rect x="678.6" y="0" width="81.4" height="30" fill="#db2777"/>
    </g>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="none" stroke="#374151" stroke-width="1"/>

    <text x="11.7" y="19" text-anchor="middle" font-size="7" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">G</text>
    <text x="36.9" y="19" text-anchor="middle" font-size="7" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">F</text>
    <text x="69.8" y="19" text-anchor="middle" font-size="7" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">E</text>
    <text x="112.5" y="19" text-anchor="middle" font-size="7" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">D</text>
    <text x="193.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">C/C+</text>
    <text x="319.9" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">B/B+</text>
    <text x="475.0" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">A/A+</text>
    <text x="620.4" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">S/S+</text>
    <text x="719.3" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">SS/SS+</text>

    <g fill="#374151" font-size="8" font-weight="600">
      <text x="0" y="48">0</text>
      <text x="252" y="48" text-anchor="middle">6.5k</text>
      <text x="562.2" y="48" text-anchor="middle">14.5k</text>
      <text x="760" y="48" text-anchor="end">19.6k</text>
    </g>
  </g>

  <!-- Ultimate ranks: UG to US9, ending at LG threshold -->
  <g transform="translate(50, 148)">
    <text x="0" y="-8" font-size="10" font-weight="700" fill="#1f2937">ULTIMATE RANKS (19.6k to 76k)</text>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="#eff6ff" stroke="#374151" stroke-width="1"/>
    <g clip-path="url(#ultimateClip)">
      <rect x="0" y="0" width="57.9" height="30" fill="#3b82f6"/>
      <rect x="57.9" y="0" width="66.0" height="30" fill="#6366f1"/>
      <rect x="124.0" y="0" width="75.5" height="30" fill="#7c3aed"/>
      <rect x="199.4" y="0" width="84.9" height="30" fill="#9333ea"/>
      <rect x="284.3" y="0" width="93.0" height="30" fill="#c026d3"/>
      <rect x="377.3" y="0" width="102.4" height="30" fill="#db2777"/>
      <rect x="479.7" y="0" width="110.5" height="30" fill="#e11d48"/>
      <rect x="590.2" y="0" width="169.8" height="30" fill="#dc2626"/>
    </g>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="none" stroke="#374151" stroke-width="1"/>

    <text x="29.0" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UG</text>
    <text x="90.9" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UF</text>
    <text x="161.7" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UE</text>
    <text x="241.9" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UD</text>
    <text x="330.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UC</text>
    <text x="428.5" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UB</text>
    <text x="534.9" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">UA</text>
    <text x="675.1" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">US-US9</text>

    <g fill="#374151" font-size="8" font-weight="600">
      <text x="0" y="48">19.6k</text>
      <text x="199.4" y="48" text-anchor="middle">34.4k</text>
      <text x="479.7" y="48" text-anchor="middle">55.2k</text>
      <text x="760" y="48" text-anchor="end">76k</text>
    </g>
  </g>

  <!-- Legend ranks: LG to LS24 -->
  <g transform="translate(50, 228)">
    <text x="0" y="-8" font-size="10" font-weight="700" fill="#1f2937">LEGEND RANKS (76k to LS24 at 190.4k)</text>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="#fffbeb" stroke="#374151" stroke-width="1"/>
    <g clip-path="url(#legendClip)">
      <rect x="0" y="0" width="102.3" height="30" fill="#eab308"/>
      <rect x="102.3" y="0" width="93.0" height="30" fill="#d97706"/>
      <rect x="195.3" y="0" width="89.0" height="30" fill="#ea580c"/>
      <rect x="284.3" y="0" width="91.0" height="30" fill="#dc2626"/>
      <rect x="375.3" y="0" width="93.7" height="30" fill="#be123c"/>
      <rect x="469.0" y="0" width="96.3" height="30" fill="#9f1239"/>
      <rect x="565.3" y="0" width="98.3" height="30" fill="#7f1d1d"/>
      <rect x="663.7" y="0" width="96.3" height="30" fill="#581c87"/>
    </g>
    <rect x="0" y="0" width="760" height="30" rx="6" fill="none" stroke="#374151" stroke-width="1"/>

    <text x="51.2" y="19" text-anchor="middle" font-size="8" fill="#1f2937" font-weight="700" stroke="#fff" stroke-width="2" paint-order="stroke">LG-LG24</text>
    <text x="148.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LF-LF24</text>
    <text x="239.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LE-LE24</text>
    <text x="329.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LD-LD24</text>
    <text x="422.2" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LC-LC24</text>
    <text x="517.2" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LB-LB24</text>
    <text x="614.5" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LA-LA24</text>
    <text x="711.8" y="19" text-anchor="middle" font-size="8" fill="white" font-weight="700" stroke="#000" stroke-width="2" paint-order="stroke">LS-LS24</text>

    <g fill="#374151" font-size="8" font-weight="600">
      <text x="0" y="48">76k</text>
      <text x="284.3" y="48" text-anchor="middle">118.8k</text>
      <text x="565.3" y="48" text-anchor="middle">161.1k</text>
      <text x="760" y="48" text-anchor="end">190.4k</text>
    </g>
  </g>

  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="760" height="34" rx="8" fill="white" stroke="#374151" stroke-width="1"/>
    <text x="24" y="22" font-size="10" fill="#1f2937">
      <tspan font-weight="700">18</tspan> base ranks
      <tspan dx="26" font-weight="700">80</tspan> ultimate ranks
      <tspan dx="26" font-weight="700">200</tspan> legend ranks
      <tspan dx="26">= </tspan><tspan font-weight="700" fill="#059669">298 total tiers</tspan>
    </text>
  </g>

  <defs>
    <clipPath id="baseClip"><rect x="0" y="0" width="760" height="30" rx="6"/></clipPath>
    <clipPath id="ultimateClip"><rect x="0" y="0" width="760" height="30" rx="6"/></clipPath>
    <clipPath id="legendClip"><rect x="0" y="0" width="760" height="30" rx="6"/></clipPath>
  </defs>
</svg>
