<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="system-ui, -apple-system, sans-serif">
  <rect width="700" height="260" fill="white"/>

  <defs>
    <clipPath id="barClip">
      <rect x="0" y="0" width="550" height="32" rx="6"/>
    </clipPath>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2937">Rating Composition</text>

  <g transform="translate(0, 50)">
    <rect x="30" y="0" width="155" height="68" rx="8" fill="#3b82f6" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="107" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white" stroke="#1e3a5f" stroke-width="3" paint-order="stroke">Stat Score</text>
    <text x="107" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#1e3a5f" stroke-width="2.5" paint-order="stroke">5 stats x lookup table</text>

    <text x="205" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">+</text>

    <rect x="225" y="0" width="155" height="68" rx="8" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
    <text x="302" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white" stroke="#4c1d95" stroke-width="3" paint-order="stroke">Unique Bonus</text>
    <text x="302" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#4c1d95" stroke-width="2.5" paint-order="stroke">level x star multiplier</text>

    <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">+</text>

    <rect x="420" y="0" width="155" height="68" rx="8" fill="#d97706" stroke="#78350f" stroke-width="1.5"/>
    <text x="497" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white" stroke="#78350f" stroke-width="3" paint-order="stroke">Skill Score</text>
    <text x="497" y="48" text-anchor="middle" font-size="10" fill="white" stroke="#78350f" stroke-width="2.5" paint-order="stroke">sum of skill scores</text>

    <text x="595" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">=</text>

    <rect x="613" y="0" width="70" height="68" rx="8" fill="#059669" stroke="#064e3b" stroke-width="1.5"/>
    <text x="648" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="white" stroke="#064e3b" stroke-width="2.5" paint-order="stroke">Total</text>
    <text x="648" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="white" stroke="#064e3b" stroke-width="2.5" paint-order="stroke">Rating</text>
  </g>

  <text x="30" y="155" font-size="11" font-weight="600" fill="#1f2937">Example late-build breakdown (5 stats at 1200, 3-star unique Lv5, 24000 skill score):</text>

  <g transform="translate(30, 165)">
    <!-- Total 44,055: Stats 19,205 = 43.6%, Unique 850 = 1.9%, Skills 24,000 = 54.5% -->
    <g clip-path="url(#barClip)">
      <rect x="0" y="0" width="239.8" height="32" fill="#3b82f6"/>
      <rect x="239.8" y="0" width="10.6" height="32" fill="#7c3aed"/>
      <rect x="250.4" y="0" width="299.6" height="32" fill="#d97706"/>
    </g>

    <rect x="0" y="0" width="550" height="32" rx="6" fill="none" stroke="#374151" stroke-width="1.5"/>

    <text x="120" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="white" stroke="#1e3a5f" stroke-width="2.5" paint-order="stroke">Stats: 19,205 (43.6%)</text>
    <text x="400" y="21" text-anchor="middle" font-size="10" font-weight="700" fill="white" stroke="#78350f" stroke-width="2.5" paint-order="stroke">Skills: 24,000 (54.5%)</text>
    <text x="560" y="21" font-size="11" font-weight="700" fill="#059669">= 44,055</text>
  </g>

  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#3b82f6" stroke="#1f2937" stroke-width="0.5"/><text x="18" y="10" font-size="10" fill="#1f2937">Stat Score</text>
    <rect x="110" y="0" width="12" height="12" rx="2" fill="#7c3aed" stroke="#1f2937" stroke-width="0.5"/><text x="128" y="10" font-size="10" fill="#1f2937">Unique Bonus</text>
    <rect x="240" y="0" width="12" height="12" rx="2" fill="#d97706" stroke="#1f2937" stroke-width="0.5"/><text x="258" y="10" font-size="10" fill="#1f2937">Skill Score</text>
    <rect x="360" y="0" width="12" height="12" rx="2" fill="#059669" stroke="#1f2937" stroke-width="0.5"/><text x="378" y="10" font-size="10" fill="#1f2937">Total Rating</text>
  </g>
</svg>
