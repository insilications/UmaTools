  <body>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('umasearch-darkmode');
          var dark = pref
            ? pref === 'dark'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.add('is-loading');
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';

          var pageLoaded = false;
          var navReady = !document.querySelector('script[src="/js/nav.js"]');
          var release = function () {
            root.classList.remove('is-loading');
          };
          var tryRelease = function () {
            if (!pageLoaded || !navReady) return;
            if (document.fonts && document.fonts.ready) {
              Promise.race([
                document.fonts.ready,
                new Promise(function (resolve) {
                  setTimeout(resolve, 1200);
                }),
              ]).then(function () {
                requestAnimationFrame(release);
              });
            } else {
              requestAnimationFrame(release);
            }
          };
          window.addEventListener('load', function () {
            pageLoaded = true;
            tryRelease();
          });
          window.addEventListener('nav:ready', function () {
            navReady = true;
            tryRelease();
          });
          window.setTimeout(function () {
            pageLoaded = true;
            navReady = true;
            tryRelease();
          }, 2400);
        } catch (e) {}
      })();
    </script>
    <main id="main" class="container">
      <h1 data-i18n="rankBreakdown.title">Rating Rank Breakdown</h1>

      <button
        id="modeToggleBtn"
        aria-label="Toggle dark/light mode"
        data-i18n-aria="common.toggleDarkLight"
        class="mode-toggle-btn"
        title="Toggle dark/light mode"
        data-i18n-title="common.toggleDarkLight"
      >
        <svg
          id="iconSun"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="feather feather-sun"
        >
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg
          id="iconMoon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="feather feather-moon"
          style="display: none"
        >
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
        </svg>
      </button>

      <p class="subtle" data-i18n="rankBreakdown.subtitle">
        Thresholds and badge icons from G to LS24.
      </p>

      <section class="card card-elevated rank-breakdown-card">
        <div class="rank-breakdown-toolbar">
          <label class="rank-lookup-field" for="rating-lookup">
            <span data-i18n="rankBreakdown.lookupLabel">Find by Rating</span>
            <input
              id="rating-lookup"
              type="number"
              min="0"
              step="1"
              inputmode="numeric"
              placeholder="Enter rating..."
              data-i18n-placeholder="rankBreakdown.lookupPlaceholder"
            />
          </label>
          <button id="rating-lookup-go" class="btn" type="button" data-i18n="rankBreakdown.lookupGo">
            Go
          </button>
          <div id="rating-lookup-result" class="muted" aria-live="polite"></div>
        </div>
        <div class="rank-overall-progress-wrap" aria-live="polite">
          <div class="rank-overall-progress-label">
            <span data-i18n="rankBreakdown.overallProgress">Overall Progress</span>
            <span id="rank-overall-percent">0%</span>
          </div>
          <div
            id="rank-overall-bar"
            class="rank-overall-progress-bar"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="rank-overall-fill" class="rank-overall-progress-fill"></div>
          </div>
        </div>
        <div class="rank-breakdown-table-wrap">
          <table class="rank-breakdown-table">
            <thead>
              <tr>
                <th scope="col" data-i18n="rankBreakdown.colIcon">Icon</th>
                <th scope="col" data-i18n="rankBreakdown.colRank">Rank</th>
                <th scope="col" class="number-col" data-i18n="rankBreakdown.colMinimum">Minimum</th>
                <th scope="col" class="number-col" data-i18n="rankBreakdown.colNext">Next Threshold</th>
                <th scope="col" class="number-col" data-i18n="rankBreakdown.colRange">Range</th>
              </tr>
            </thead>
            <tbody id="rank-breakdown-body">
              <tr>
                <td class="muted" colspan="5" data-i18n="rankBreakdown.loading">
                  Loading rank breakdown...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
